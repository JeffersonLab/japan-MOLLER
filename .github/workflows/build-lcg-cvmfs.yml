---
name: Build LCG on CVMFS

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  linux:
    name: ${{ matrix.release }}-${{ matrix.arch }}-${{ matrix.compiler }} (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Standard builds without sanitizers
          - release: "LCG_106"
            arch: "x86_64"
            os: "el9"
            compiler: "gcc13"
            opt: "opt"
            sanitizer: "none"
          - release: "LCG_107"
            arch: "x86_64"
            os: "el9"
            compiler: "clang16"
            opt: "opt"
            sanitizer: "none"
          - release: "LCG_107"
            arch: "x86_64"
            os: "el9"
            compiler: "gcc14"
            opt: "opt"
            sanitizer: "none"
          # AddressSanitizer builds (using clang for better ASAN support)
          - release: "LCG_107"
            arch: "x86_64"
            os: "el9"
            compiler: "clang16"
            opt: "opt"
            sanitizer: "asan"
          # UndefinedBehaviorSanitizer builds
          - release: "LCG_107"
            arch: "x86_64"
            os: "el9"
            compiler: "clang16"
            opt: "opt"
            sanitizer: "ubsan"
          # Combined AddressSanitizer + UndefinedBehaviorSanitizer builds
          - release: "LCG_107"
            arch: "x86_64"
            os: "el9"
            compiler: "clang16"
            opt: "opt"
            sanitizer: "asan+ubsan"
    steps:
      - uses: actions/checkout@v3
      - uses: cvmfs-contrib/github-action-cvmfs@v3
        with:
          cvmfs_repositories: 'sft.cern.ch,geant4.cern.ch'
      - name: Create qwparity.conf symlink
        run: ln -sf Parity/prminput/qwparity_simple.conf qwparity.conf
      - uses: aidasoft/run-lcg-view@v1
        with:
          release-platform: ${{ matrix.release }}/${{ matrix.arch }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.opt }}
          run: |
            echo "::group::Configuration"
            # Set BOOST_INC_DIR and BOOST_LIB_DIR to point to
            # LCG-provided Boost installation
            LCG_PATH="/cvmfs/sft.cern.ch/lcg/views/${{ matrix.release }}/${{ matrix.arch }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.opt }}"
            export BOOST_INC_DIR="${LCG_PATH}/include"
            export BOOST_LIB_DIR="${LCG_PATH}/lib"

            # Generate setup scripts
            chmod +x SetupFiles/make_SET_ME_UP
            SetupFiles/make_SET_ME_UP
            echo "::endgroup::"

            echo "::group::Compilation"
            # Build the project with optional sanitizers
            CMAKE_OPTIONS=""
            if [[ "${{ matrix.sanitizer }}" == "asan" ]]; then
              CMAKE_OPTIONS="-DUSE_ASAN=ON"
              echo "Building with AddressSanitizer enabled"
            elif [[ "${{ matrix.sanitizer }}" == "ubsan" ]]; then
              CMAKE_OPTIONS="-DUSE_UBSAN=ON"
              echo "Building with UndefinedBehaviorSanitizer enabled"
            elif [[ "${{ matrix.sanitizer }}" == "asan+ubsan" ]]; then
              CMAKE_OPTIONS="-DUSE_ASAN=ON -DUSE_UBSAN=ON"
              echo "Building with both AddressSanitizer and UndefinedBehaviorSanitizer enabled"
            else
              echo "Building without sanitizers"
            fi
            
            cmake -Bbuild -S. ${CMAKE_OPTIONS}
            cmake --build build -j$(nproc)
            echo "::endgroup::"

            echo "::group::Mock data generation"
            # Run the mock data generator and analysis as described in README
            source SetupFiles/SET_ME_UP.bash
            
            # Set up sanitizer environment if enabled
            if [[ "${{ matrix.sanitizer }}" == "asan" ]]; then
              export ASAN_OPTIONS="detect_leaks=1:abort_on_error=1:log_path=./asan"
              export LSAN_OPTIONS="suppressions=${{ github.workspace }}/.github/lsan.supp"
              echo "AddressSanitizer configured with leak detection and suppressions"
            elif [[ "${{ matrix.sanitizer }}" == "ubsan" ]]; then
              export UBSAN_OPTIONS="abort_on_error=1:suppressions=${{ github.workspace }}/.github/ubsan.supp:log_path=./ubsan"
              echo "UndefinedBehaviorSanitizer configured with suppressions"
            elif [[ "${{ matrix.sanitizer }}" == "asan+ubsan" ]]; then
              export ASAN_OPTIONS="detect_leaks=1:abort_on_error=1:log_path=./asan"
              export LSAN_OPTIONS="suppressions=${{ github.workspace }}/.github/lsan.supp"
              export UBSAN_OPTIONS="abort_on_error=1:suppressions=${{ github.workspace }}/.github/ubsan.supp:log_path=./ubsan"
              echo "Both AddressSanitizer and UndefinedBehaviorSanitizer configured with suppressions"
            fi
            
            # Generate mock data
            build/qwmockdatagenerator -r 4 -e 1:20000 --config qwparity_simple.conf --detectors mock_newdets.map --data .
            echo "::endgroup::"
            
            echo "::group::Mock data analysis"
            # Analyze the generated mock data
            build/qwparity -r 4 --config qwparity_simple.conf --detectors mock_newdets.map --datahandlers mock_datahandlers.map --data . --rootfiles . --write-promptsummary
            echo "::endgroup::"

      - name: Upload prompt summary
        uses: actions/upload-artifact@v4
        with:
          name: prompt-summary-${{ matrix.release }}-${{ matrix.arch }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.sanitizer }}
          path: |
            summary_*.txt
          retention-days: 7
          if-no-files-found: error

      - name: Ensure sanitizer logs are readable
        if: always() && (matrix.sanitizer == 'asan' || matrix.sanitizer == 'ubsan' || matrix.sanitizer == 'asan+ubsan')
        run: |
          shopt -s nullglob
          ls -al ./asan* ./ubsan* 2>/dev/null || echo "No sanitizer logs found"
          sudo chmod +r ./asan* ./ubsan* 2>/dev/null || echo "No logs to change permissions for"
            
      - name: Upload sanitizer logs
        if: always() && (matrix.sanitizer == 'asan' || matrix.sanitizer == 'ubsan' || matrix.sanitizer == 'asan+ubsan')
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-logs-${{ matrix.release }}-${{ matrix.arch }}-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.sanitizer }}
          path: |
            ./asan*
            ./ubsan*
          if-no-files-found: ignore
